<!DOCTYPE html>
<html lang="en" class="noselect">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Your Superpowers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #121212;
      --bg-secondary: #1f1f1f;
      --bg-tertiary: #333333;
      --bg-gradient-dark: linear-gradient(145deg, #1e1e1e, #333333);
      --bg-input: #2c2c2c;
      --text-primary: #fff;
      --text-secondary: #ddd;
      --text-tertiary: #b0bec5;
      --text-muted: rgb(230, 230, 230);
      --accent-primary: #ffc107;
      --accent-hover: #e0a800;
      --accent-focus: #ffd54f;
      --accent-button-text: black;
      --shadow-dark: rgba(0,0,0,0.5);
      --shadow-medium: rgba(0,0,0,0.6);
      --shadow-light: rgba(0,0,0,0.4);
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 20px;
      --spacing-xxl: 25px;
      --spacing-xxxl: 30px;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 10px;
      --radius-xl: 12px;
      --radius-full: 50%;
      --font-sm: 0.9rem;
      --font-base: 1rem;
      --font-md: 1.1rem;
      --font-lg: 1.2rem;
      --font-xl: 1.6rem;
      --font-xxl: 1.7rem;
      --font-xxxl: 1.8rem;
      --font-icon-sm: 1.2rem;
      --transition-fast: 0.2s ease;
      --transition-base: 0.3s ease;
      --transition-slow: 0.4s all;
    }

    body.light-theme {
      --bg-primary: #ffffff;
      --bg-secondary: rgb(253,253,253);
      --bg-tertiary: rgb(240,240,240);
      --bg-gradient-dark: linear-gradient(145deg, #ffffff, #f0f0f0);
      --bg-input: #ffffff;
      --text-primary: #333;
      --text-secondary: rgb(50,50,50);
      --text-tertiary: rgb(80,80,80);
      --text-muted: #333;
      --accent-button-text: rgb(30,30,30);
      --shadow-dark: rgba(0,0,0,0.1);
      --shadow-medium: rgba(0,0,0,0.1);
      --shadow-light: rgba(0,0,0,0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      max-height: 9999999px;
      font-family: 'Roboto', sans-serif;
      transition: var(--transition-base) all;
    }

    .noselect {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: var(--spacing-xl);
      overflow-x: hidden;
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      position: fixed;
      top: var(--spacing-xl);
      right: var(--spacing-xl);
      background-color: var(--bg-secondary);
      border: none;
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
      cursor: pointer;
      color: var(--text-primary);
      font-size: var(--font-icon-sm);
      box-shadow: 0 2px 8px var(--shadow-light);
      transition: var(--transition-base);
      z-index: 1000;
    }
    .theme-toggle:hover { background-color: var(--bg-tertiary); transform: scale(1.1); }
    .theme-toggle:active { transform: scale(0.95); }

    /* ── Container (screens) ── */
    .container {
      max-width: 900px;
      width: 100%;
      background: var(--bg-gradient-dark);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xxxl);
      color: var(--text-primary);
      box-shadow: 0 8px 30px var(--shadow-medium);
      text-align: center;
      display: none;
    }
    .container.active {
      display: block;
      animation: fadeIn var(--transition-base);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Typography ── */
    h1 { font-size: var(--font-xl); font-weight: 700; margin-bottom: var(--spacing-xl); color: var(--text-primary); }
    h2 { font-size: var(--font-lg); font-weight: 700; margin-bottom: var(--spacing-md); }
    h3 { font-size: var(--font-md); font-weight: 700; margin-bottom: var(--spacing-sm); }
    p  { font-size: var(--font-base); color: var(--text-secondary); line-height: 1.6; margin-bottom: var(--spacing-lg); }

    /* ── Inputs ── */
    .input-group { text-align: left; margin-bottom: var(--spacing-xl); }
    .input-group label { display: block; margin-bottom: var(--spacing-sm); font-weight: 500; color: var(--text-secondary); font-size: var(--font-base); }
    input[type="text"], select {
      padding: var(--spacing-md);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--font-base);
      background-color: var(--bg-input);
      color: var(--text-primary);
      width: 100%;
      box-shadow: 0 2px 8px var(--shadow-light);
    }
    input[type="text"]:focus, select:focus { outline: none; box-shadow: 0 0 0 3px var(--accent-focus); }
    select:hover { background-color: var(--bg-secondary); }

    /* ── Buttons ── */
    button {
      display: inline-block;
      margin-top: var(--spacing-lg);
      padding: var(--spacing-md) var(--spacing-xxl);
      font-size: var(--font-lg);
      color: var(--accent-button-text);
      background: var(--accent-primary);
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-weight: bold;
      transition: var(--transition-base);
    }
    button:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 4px 15px var(--shadow-medium); }
    button:active { transform: translateY(0); box-shadow: 0 2px 8px var(--shadow-light); }

    /* ── Disclaimer ── */
    .disclaimer-box {
      background-color: rgba(255,193,7,0.1);
      border-left: 4px solid var(--accent-primary);
      padding: var(--spacing-lg);
      text-align: left;
      margin-bottom: var(--spacing-xl);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
    }
    .disclaimer-box p { margin: 0; }

    /* ── Progress Bar ── */
    .progress-bar {
      width: 100%;
      height: 8px;
      background-color: var(--bg-input);
      border-radius: var(--radius-full);
      margin-bottom: var(--spacing-xl);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background-color: var(--accent-primary);
      width: 0%;
      transition: width var(--transition-base);
    }
    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-sm);
    }
    .question-meta span { font-size: var(--font-sm); color: var(--text-tertiary); font-weight: 500; }
    .question-meta .q-count { color: var(--accent-primary); font-weight: 700; }

    /* ── Quiz Options ── */
    .q-text {
      text-align: left;
      font-size: var(--font-md);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--spacing-xl);
      line-height: 1.5;
    }
    .options-grid { display: grid; grid-template-columns: 1fr; gap: var(--spacing-md); margin-top: var(--spacing-xl); }
    .option-btn {
      background-color: var(--bg-input);
      color: var(--text-primary);
      padding: var(--spacing-lg);
      border-radius: var(--radius-md);
      border: 2px solid transparent;
      text-align: left;
      font-size: var(--font-md);
      cursor: pointer;
      margin-top: 0;
      font-weight: 400;
    }
    .option-btn:hover {
      border-color: var(--accent-primary);
      background-color: var(--bg-secondary);
      transform: translateX(4px);
    }

    /* ── Result Sections ── */
    .result-section {
      background-color: var(--bg-secondary);
      padding: var(--spacing-xl);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-xl);
      text-align: left;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      color: var(--accent-primary);
      font-size: var(--font-lg);
      font-weight: 700;
      margin-bottom: var(--spacing-lg);
    }
    .section-header i { font-size: var(--font-md); }

    /* ── Personality Hero ── */
    .personality-hero { display: flex; gap: var(--spacing-xl); align-items: flex-start; }
    .hero-emoji { font-size: 2.8rem; flex-shrink: 0; line-height: 1; margin-top: 4px; }
    .hero-content { flex: 1; }
    .mbti-badge {
      display: inline-block;
      background: var(--accent-primary);
      color: var(--accent-button-text);
      border-radius: var(--radius-sm);
      padding: 2px 12px;
      font-size: var(--font-sm);
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: var(--spacing-sm);
    }
    .hero-nickname { font-size: var(--font-xl); font-weight: 700; margin-bottom: var(--spacing-xs); }
    .hero-tagline { font-size: var(--font-sm); color: var(--text-tertiary); font-style: italic; margin-bottom: var(--spacing-md); }
    .hero-desc { color: var(--text-secondary); font-size: var(--font-base); line-height: 1.6; margin: 0; }
    @media (max-width: 540px) { .personality-hero { flex-direction: column; gap: var(--spacing-md); } }

    /* ── MBTI Axes ── */
    .axis-row { margin-bottom: var(--spacing-lg); }
    .axis-row:last-child { margin-bottom: 0; }
    .axis-labels { display: flex; justify-content: space-between; font-size: var(--font-sm); font-weight: 500; color: var(--text-tertiary); margin-bottom: var(--spacing-xs); }
    .axis-labels .dominant { color: var(--accent-primary); font-weight: 700; }
    .axis-track { height: 8px; background: var(--bg-input); border-radius: var(--radius-full); overflow: hidden; display: flex; }
    .axis-fill { height: 100%; background: var(--accent-primary); border-radius: var(--radius-full); transition: width 0.8s ease; }
    .axis-note { font-size: 0.82rem; color: var(--text-tertiary); margin-top: var(--spacing-xs); }
    .axis-note strong { color: var(--text-secondary); }

    /* ── Strengths ── */
    .strengths-wrap { display: flex; flex-wrap: wrap; gap: var(--spacing-sm); margin-bottom: var(--spacing-lg); }
    .strength-pill {
      background-color: var(--bg-tertiary);
      border: 1px solid rgba(255,193,7,0.3);
      color: var(--text-muted);
      border-radius: var(--radius-full);
      padding: var(--spacing-xs) var(--spacing-md);
      font-size: var(--font-sm);
      font-weight: 500;
    }

    /* ── Info Boxes ── */
    .info-boxes { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md); }
    @media (max-width: 540px) { .info-boxes { grid-template-columns: 1fr; } }
    .info-box { background-color: var(--bg-input); border-radius: var(--radius-md); padding: var(--spacing-lg); }
    .info-box-title { font-size: var(--font-sm); font-weight: 700; margin-bottom: var(--spacing-sm); }
    .info-box.learn .info-box-title { color: #4d9de0; }
    .info-box.watch .info-box-title { color: #ff9f43; }
    .info-box p { margin: 0; font-size: var(--font-sm); color: var(--text-secondary); }

    /* ── MI Bars ── */
    .mi-bar-row { margin-bottom: var(--spacing-md); }
    .mi-bar-row:last-child { margin-bottom: 0; }
    .mi-bar-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xs); }
    .mi-bar-name { font-size: var(--font-sm); font-weight: 700; }
    .mi-bar-sub  { font-size: 0.8rem; color: var(--text-tertiary); }
    .mi-bar-track { height: 10px; background: var(--bg-input); border-radius: var(--radius-full); overflow: hidden; }
    .mi-bar-fill  { height: 100%; border-radius: var(--radius-full); transition: width 1s ease; }
    .mi-bar-desc  { font-size: 0.8rem; color: var(--text-tertiary); margin-top: var(--spacing-xs); font-style: italic; }

    /* MI colours */
    .mi-linguistic    { background-color: #e17055; }
    .mi-logical       { background-color: #4d9de0; }
    .mi-visual        { background-color: #9b59b6; }
    .mi-kinesthetic   { background-color: #00b894; }
    .mi-musical       { background-color: var(--accent-primary); }
    .mi-interpersonal { background-color: #e84393; }
    .mi-intrapersonal { background-color: #a29bfe; }
    .mi-naturalistic  { background-color: #27ae60; }

    /* ── Top MI Detail ── */
    .mi-detail-box { background-color: var(--bg-input); border-radius: var(--radius-md); padding: var(--spacing-xl); border-left: 4px solid var(--accent-primary); }
    .mi-detail-header { display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-md); }
    .mi-detail-icon { font-size: 2rem; line-height: 1; }
    .mi-detail-title { font-size: var(--font-md); font-weight: 700; }
    .mi-detail-body p { font-size: var(--font-sm); color: var(--text-secondary); margin-bottom: var(--spacing-sm); }
    .mi-detail-body p:last-child { margin-bottom: 0; }
    .mi-develop { background-color: var(--bg-secondary); border-radius: var(--radius-sm); padding: var(--spacing-md); margin-top: var(--spacing-md); }
    .mi-develop-title { font-size: var(--font-sm); font-weight: 700; color: #00b894; margin-bottom: var(--spacing-xs); }
    .mi-develop-text  { font-size: var(--font-sm); color: var(--text-secondary); margin: 0; }

    /* ── Career Grid ── */
    .career-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: var(--spacing-md); }
    .career-card {
      background-color: var(--bg-input);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: var(--font-sm);
      font-weight: 500;
      border: 1px solid transparent;
    }
    .career-card:hover { border-color: var(--accent-primary); background-color: var(--bg-tertiary); transform: translateY(-2px); }
    .career-emoji { font-size: 1.3rem; flex-shrink: 0; }

    /* ── Save Status ── */
    .save-status {
      display: flex; align-items: center; gap: var(--spacing-sm);
      font-size: var(--font-sm); font-weight: 500;
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-lg);
    }
    .save-status:empty { display: none; }
    .save-saving { background: rgba(77,157,224,0.15); color: #4d9de0; }
    .save-saved  { background: rgba(0,184,148,0.15); color: #00b894; }
    .save-error  { background: rgba(255,107,107,0.15); color: #ff6b6b; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      body { padding: var(--spacing-md); }
      .theme-toggle { top: var(--spacing-md); right: var(--spacing-md); }
      h1 { font-size: var(--font-lg); }
      .container { padding: var(--spacing-xl); }
      button { width: 100%; }
    }
    @media (max-width: 480px) {
      .career-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<body class="light-theme">
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
    <i class="fas fa-moon"></i>
  </button>

  <!-- ══════════════════════════════════ SCREEN: SETUP ══ -->
  <div class="container active" id="screen-setup">
    <h1>✨ Discover Your Superpowers!</h1>
    <p>Find out your unique personality style and hidden strengths through this fun quiz.</p>

    <div class="input-group">
      <label for="userName">Your Name / आपका नाम</label>
      <input type="text" id="userName" placeholder="Enter your name...">
    </div>
    <div class="input-group">
      <label for="userLang">Language / भाषा</label>
      <select id="userLang">
        <option value="en">English</option>
        <option value="hi">हिंदी (Hindi)</option>
      </select>
    </div>
    <button onclick="goToDisclaimer()">Let's Begin &nbsp;<i class="fas fa-arrow-right"></i></button>
  </div>

  <!-- ══════════════════════════════ SCREEN: DISCLAIMER ══ -->
  <div class="container" id="screen-disclaimer">
    <h1 id="disc-title">Important Note!</h1>
    <div class="disclaimer-box">
      <p id="disc-text"></p>
    </div>
    <button onclick="startQuiz()" id="disc-btn">I Understand — Let's Go!</button>
  </div>

  <!-- ════════════════════════════════════ SCREEN: QUIZ ══ -->
  <div class="container" id="screen-quiz">
    <div class="question-meta">
      <span id="q-section-label"></span>
      <span class="q-count" id="q-counter"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <p class="q-text" id="question-text"></p>
    <div class="options-grid" id="options-grid"></div>
  </div>

  <!-- ══════════════════════════════════ SCREEN: RESULTS ══ -->
  <div class="container" id="screen-results">

    <!-- Save status -->
    <div class="save-status" id="save-status"></div>

    <!-- Greeting -->
    <h1 id="res-greeting"></h1>
    <p id="res-intro"></p>

    <!-- 1. Personality Card -->
    <div class="result-section">
      <div class="section-header"><i class="fas fa-user-astronaut"></i><span id="sec-personality"></span></div>
      <div class="personality-hero">
        <div class="hero-emoji" id="hero-emoji"></div>
        <div class="hero-content">
          <div class="mbti-badge" id="mbti-badge"></div>
          <div class="hero-nickname" id="hero-nickname"></div>
          <div class="hero-tagline" id="hero-tagline"></div>
          <p class="hero-desc" id="hero-desc"></p>
        </div>
      </div>
    </div>

    <!-- 2. MBTI Dimensions -->
    <div class="result-section">
      <div class="section-header"><i class="fas fa-sliders-h"></i><span id="sec-dimensions"></span></div>
      <div id="mbti-axes"></div>
    </div>

    <!-- 3. Strengths + Tips -->
    <div class="result-section">
      <div class="section-header"><i class="fas fa-star"></i><span id="sec-strengths"></span></div>
      <div class="strengths-wrap" id="strengths-wrap"></div>
      <div class="info-boxes">
        <div class="info-box learn">
          <div class="info-box-title">💡 <span id="learn-title"></span></div>
          <p id="learn-text"></p>
        </div>
        <div class="info-box watch">
          <div class="info-box-title">⚡ <span id="watch-title"></span></div>
          <p id="watch-text"></p>
        </div>
      </div>
    </div>

    <!-- 4. Multiple Intelligences -->
    <div class="result-section">
      <div class="section-header"><i class="fas fa-brain"></i><span id="sec-mi"></span></div>
      <div id="mi-bars-container"></div>
    </div>

    <!-- 5. Top MI Detail -->
    <div class="result-section">
      <div class="section-header"><i class="fas fa-trophy"></i><span id="sec-mi-detail"></span></div>
      <div class="mi-detail-box" id="mi-detail-box"></div>
    </div>

    <!-- 6. Careers -->
    <div class="result-section">
      <div class="section-header"><i class="fas fa-rocket"></i><span id="sec-careers"></span></div>
      <p id="careers-intro"></p>
      <div class="career-grid" id="career-grid"></div>
    </div>

    <button onclick="location.reload()" id="res-restart-btn" style="margin-top: var(--spacing-xxl);">
      <i class="fas fa-redo"></i>&nbsp; Take Test Again
    </button>
  </div>

  <script>
  /* ─── Theme ─── */
  function toggleTheme() {
    document.body.classList.toggle('light-theme');
    document.querySelector('#themeBtn i').className =
      document.body.classList.contains('light-theme') ? 'fas fa-moon' : 'fas fa-sun';
  }

  /* ─── State ─── */
  let state = {
    name: '', lang: 'en', currentQ: 0,
    scores: {
      E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0,
      linguistic:0, logical:0, visual:0, kinesthetic:0,
      musical:0, interpersonal:0, intrapersonal:0, naturalistic:0
    }
  };

  /* ─── UI Translations ─── */
  const UI = {
    en: {
      discTitle: "Important Note!",
      discText: "<strong>Parents & Kids:</strong> This quiz is based on MBTI Personality Theory and Howard Gardner's Multiple Intelligences framework. It will help you discover how you think, learn, and what your natural strengths are.<br><br><em>Please note: This is a self-discovery tool for fun and reflection. It is not professional counselling advice, a medical assessment, or a psychological diagnosis.</em>",
      discBtn: "I Understand — Let's Go!",
      qCounter: "{c} of {t}",
      resIntro: "Here is your unique personality profile — packed with insights about how you think, what you're great at, and where you could go!",
      secPersonality: "Your Personality Type",
      secDimensions: "Your Personality Dimensions",
      secStrengths: "Your Key Strengths",
      secMi: "Your Superpowers (Multiple Intelligences)",
      secMiDetail: "Your Top Superpower — In Detail",
      secCareers: "Career Paths to Explore",
      careersIntro: "Based on your personality and top intelligences, here are careers that could be a great fit. These are just starting points — the world of possibilities is huge!",
      learnTitle: "How You Learn Best",
      watchTitle: "Something to Work On",
      axisLean: "You lean towards",
      axes: {
        EI: { left:'Extrovert (E)', right:'Introvert (I)', desc:'Energy Style — where do you get your energy from?' },
        SN: { left:'Sensing (S)',   right:'Intuition (N)',  desc:'Information Style — how do you take in the world?' },
        TF: { left:'Thinking (T)', right:'Feeling (F)',    desc:'Decision Style — how do you make choices?' },
        JP: { left:'Judging (J)',  right:'Perceiving (P)', desc:'Life Style — how do you like to organise your life?' }
      },
      restart: "Take Test Again",
      miLabels: {
        linguistic:    { name:'Word Wizard 📖',    sub:'Linguistic Intelligence' },

  /* ─── Navigation ─── */
  function switchScreen(hideId, showId) {
    document.getElementById(hideId).classList.remove('active');
    const next = document.getElementById(showId);
    next.classList.add('active');
    next.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function goToDisclaimer() {
    const name = document.getElementById('userName').value.trim();
    if (!name) { alert('Please enter your name! / कृपया अपना नाम दर्ज करें!'); return; }
    state.name = name;
    state.lang = document.getElementById('userLang').value;
    const t = UI[state.lang];
    document.getElementById('disc-title').innerHTML = t.discTitle;
    document.getElementById('disc-text').innerHTML  = t.discText;
    document.getElementById('disc-btn').textContent = t.discBtn;
    switchScreen('screen-setup', 'screen-disclaimer');
  }

  function startQuiz() { switchScreen('screen-disclaimer', 'screen-quiz'); loadQuestion(); }

  /* ─── Quiz ─── */
  function loadQuestion() {
    if (state.currentQ >= QUESTIONS.length) { computeAndShowResults(); return; }
    const q   = QUESTIONS[state.currentQ];
    const t   = UI[state.lang];
    const pct = (state.currentQ / QUESTIONS.length) * 100;

    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('q-section-label').textContent = 'Category: ' + q.cat;
    document.getElementById('q-counter').textContent =
      t.qCounter.replace('{c}', state.currentQ + 1).replace('{t}', QUESTIONS.length);
    document.getElementById('question-text').textContent = q.text[state.lang];

    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.style.marginTop = '0';
      btn.textContent = opt.text[state.lang];
      btn.onclick = () => pickAnswer(opt.scores);
      grid.appendChild(btn);
    });
  }

  function pickAnswer(scores) {
    for (const [k, v] of Object.entries(scores)) {
      if (state.scores[k] !== undefined) state.scores[k] += v;
    }
    state.currentQ++;
    loadQuestion();
  }

  /* ─── Results ─── */
  function computeAndShowResults() {
    const s = state.scores;
    const mbti =
      (s.E >= s.I ? 'E' : 'I') +
      (s.S >= s.N ? 'S' : 'N') +
      (s.T >= s.F ? 'T' : 'F') +
      (s.J >= s.P ? 'J' : 'P');
    const MI_TYPES = ['linguistic','logical','visual','kinesthetic','musical','interpersonal','intrapersonal','naturalistic'];
    const miSorted = [...MI_TYPES].sort((a, b) => s[b] - s[a]);
    const maxMI = s[miSorted[0]] || 1;

    switchScreen('screen-quiz', 'screen-results');
    renderResults(mbti, miSorted, maxMI);
    saveResults(mbti, miSorted).catch(e => console.warn('Save failed:', e));
  }

  function renderResults(mbti, miSorted, maxMI) {
    const t    = UI[state.lang];
    const s    = state.scores;
    const info = MBTI_DETAILS[mbti] || MBTI_DETAILS['INFP'];
    const topMI = MI_DETAILS[miSorted[0]];

    /* Greeting */
    document.getElementById('res-greeting').textContent =
      state.lang === 'en' ? `Great job, ${state.name}! 🎉` : `शाबाश, ${state.name}! 🎉`;
    document.getElementById('res-intro').textContent = t.resIntro;

    /* Section labels */
    document.getElementById('sec-personality').textContent = t.secPersonality;
    document.getElementById('sec-dimensions').textContent  = t.secDimensions;
    document.getElementById('sec-strengths').textContent   = t.secStrengths;
    document.getElementById('sec-mi').textContent          = t.secMi;
    document.getElementById('sec-mi-detail').textContent   = t.secMiDetail;
    document.getElementById('sec-careers').textContent     = t.secCareers;
    document.getElementById('careers-intro').textContent   = t.careersIntro;
    document.getElementById('learn-title').textContent     = t.learnTitle;
    document.getElementById('watch-title').textContent     = t.watchTitle;
    document.getElementById('res-restart-btn').innerHTML   = `<i class="fas fa-redo"></i>&nbsp; ${t.restart}`;

    /* Hero */
    document.getElementById('hero-emoji').textContent    = info.emoji;
    document.getElementById('mbti-badge').textContent    = mbti;
    document.getElementById('hero-nickname').textContent = info.nickname;
    document.getElementById('hero-tagline').textContent  = info.tagline;
    document.getElementById('hero-desc').textContent     = info.description;

    /* MBTI Axes */
    const axisData = [
      { key:'EI', a:'E', b:'I', sA: s.E, sB: s.I },
      { key:'SN', a:'S', b:'N', sA: s.S, sB: s.N },
      { key:'TF', a:'T', b:'F', sA: s.T, sB: s.F },
      { key:'JP', a:'J', b:'P', sA: s.J, sB: s.P }
    ];
    document.getElementById('mbti-axes').innerHTML = axisData.map(ax => {
      const total = ax.sA + ax.sB || 1;
      const pctA  = Math.round((ax.sA / total) * 100);
      const domLabel = pctA >= 50 ? t.axes[ax.key].left : t.axes[ax.key].right;
      const domPct   = pctA >= 50 ? pctA : 100 - pctA;
      const lA = pctA >= 50
        ? `<span class="dominant">${t.axes[ax.key].left}</span>`
        : `<span>${t.axes[ax.key].left}</span>`;
      const lB = pctA < 50
        ? `<span class="dominant">${t.axes[ax.key].right}</span>`
        : `<span>${t.axes[ax.key].right}</span>`;
      return `<div class="axis-row">
        <div class="axis-labels">${lA}${lB}</div>
        <div class="axis-track"><div class="axis-fill" style="width:${pctA}%"></div></div>
        <div class="axis-note">${t.axisLean}: <strong>${domLabel}</strong> (${domPct}%) &nbsp;·&nbsp; ${t.axes[ax.key].desc}</div>
      </div>`;
    }).join('');

    /* Strengths */
    document.getElementById('strengths-wrap').innerHTML =
      info.strengths.map(s => `<span class="strength-pill">${s}</span>`).join('');
    document.getElementById('learn-text').textContent = info.learningTip;
    document.getElementById('watch-text').textContent = info.watchOut;

    /* MI Bars */
    document.getElementById('mi-bars-container').innerHTML = miSorted.map((type, i) => {
      const score = s[type];
      const pct   = Math.min(Math.round((score / maxMI) * 100), 100);
      const label = t.miLabels[type];
      return `<div class="mi-bar-row">
        <div class="mi-bar-label">
          <span class="mi-bar-name">${label.name}</span>
          <span class="mi-bar-sub">${label.sub}</span>
        </div>
        <div class="mi-bar-track">
          <div class="mi-bar-fill ${MI_DETAILS[type].cssClass}" style="width:${pct}%"></div>
        </div>
        ${i < 3 ? `<div class="mi-bar-desc">${MI_DETAILS[type].description.split('.')[0]}.</div>` : ''}
      </div>`;
    }).join('');

    /* Top MI Detail */
    const mdb = document.getElementById('mi-detail-box');
    mdb.innerHTML = `
      <div class="mi-detail-header">
        <div class="mi-detail-icon">${topMI.emoji}</div>
        <div class="mi-detail-title">${topMI.fullName}</div>
      </div>
      <div class="mi-detail-body">
        <p><strong>What it means:</strong> ${topMI.description}</p>
        <p><strong>In daily life:</strong> ${topMI.dailyLife}</p>
        <div class="mi-develop">
          <div class="mi-develop-title">💪 How to grow this superpower:</div>
          <p class="mi-develop-text">${topMI.develop}</p>
        </div>
      </div>`;

    /* Careers */
    const allCareers = [
      ...MI_DETAILS[miSorted[0]].topCareers,
      ...(MI_DETAILS[miSorted[1]]?.topCareers || []),
      ...info.careers.map(n => ({ e: careerEmoji(n), n }))
    ];
    const seen = new Set();
    const unique = allCareers.filter(c => { if (seen.has(c.n)) return false; seen.add(c.n); return true; });
    document.getElementById('career-grid').innerHTML =
      unique.slice(0, 9).map(c =>
        `<div class="career-card"><span class="career-emoji">${c.e}</span><span>${c.n}</span></div>`
      ).join('');
  }

    const MAP = { 'Software Engineer':'💻','Research Scientist':'🔬','Architect':'🏛️','Data Scientist':'📊','Investment Analyst':'📈','Strategic Planner':'🗓️','Entrepreneur':'🚀','Professor':'🎓','Mathematician':'📐','Computer Scientist':'🖥️','Physicist':'⚛️','Philosopher':'🤔','Game Designer':'🎮','Research Analyst':'📋','Systems Architect':'🏗️','CEO / Executive':'👔','Lawyer':'⚖️','Business Manager':'📁','Military Officer':'🪖','School Principal':'🏫','Judge':'⚖️','Politician':'🗳️','Journalist':'📰','Marketing Director':'📣','Inventor':'💡','Film Director':'🎬','Political Analyst':'🗳️','Startup Founder':'🌱','Counselor':'🧩','Psychologist':'🧠','Writer':'✍️','Teacher':'📚','Non-profit Leader':'💝','Doctor':'🏥','Social Worker':'🤝','UX Designer':'🖌️','Author':'📖','Artist':'🎨','Musician':'🎵','HR Manager':'👥','Life Coach':'🌟','Non-profit Director':'🌍','Actor':'🎭','Event Planner':'🎉','Designer':'✏️','Accountant':'💰','Engineer':'⚙️','Police Officer':'👮','Librarian':'📚','Financial Analyst':'💹','Nurse':'💉','Interior Designer':'🛋️','Veterinarian':'🐾','Administrator':'📋','Civil Engineer':'🏗️','Executive Director':'🏢','Sales Manager':'📊','HR Professional':'👥','Chef':'👨‍🍳','Professional Athlete':'⚽','Sales Executive':'💼','Emergency Responder':'🚑','Sports Coach':'🎯','Pilot':'✈️','Dancer':'💃','Event Coordinator':'📋','Sales Representative':'📱','Fitness Trainer':'💪','Tour Guide':'🗺️','Music Artist':'🎤','Mechanic':'🔧','Surgeon':'🏥','Programmer':'💻','Craftsperson':'🪵','Military Technician':'🪖','Fashion Designer':'👗','Physical Therapist':'🏃','Photographer':'📸','Botanist':'🌱','Geologist':'🪨','Biologist':'🧬','Environmental Scientist':'🌿','Wildlife Photographer':'📸','Composer':'🎼','Sound Engineer':'🎚️','Music Teacher':'🎹','Conductor':'🎻','Music Producer':'🎧' };
    return MAP[name] || '🌟';
  }

  /* ─── Save to Supabase ─── */
  async function getStudentId() {
    try { const { data } = await parent.supabase.auth.getUser(); return data?.user?.id || null; }
    catch (e) { return null; }
  }

  function setSaveStatus(cls, html) {
    const el = document.getElementById('save-status');
    el.className = cls ? `save-status ${cls}` : 'save-status';
    el.innerHTML = html;
  }

  async function saveResults(mbtiType, miSorted) {
    setSaveStatus('save-saving', '<i class="fas fa-spinner fa-spin"></i> &nbsp;Saving your results...');
    const studentId = await getStudentId();
    if (!studentId) { setSaveStatus('', ''); return; }

    const s = state.scores;
    const record = {
      student_id: studentId, lang: state.lang,
      score_e: s.E, score_i: s.I, score_s: s.S, score_n: s.N,
      score_t: s.T, score_f: s.F, score_j: s.J, score_p: s.P,
      mbti_type: mbtiType,
      mi_linguistic: s.linguistic, mi_logical: s.logical, mi_visual: s.visual,
      mi_kinesthetic: s.kinesthetic, mi_musical: s.musical, mi_interpersonal: s.interpersonal,
      mi_intrapersonal: s.intrapersonal, mi_naturalistic: s.naturalistic,
      top_intelligence: miSorted[0], second_intelligence: miSorted[1] || null, third_intelligence: miSorted[2] || null
    };

    try {
      const result = await parent.insertData('personality_test_results', record);
      if (result) {
        setSaveStatus('save-saved', '<i class="fas fa-check-circle"></i> &nbsp;Results saved to your profile!');
        setTimeout(() => setSaveStatus('', ''), 4000);
      } else {
        setSaveStatus('save-error', '<i class="fas fa-exclamation-triangle"></i> &nbsp;Could not save results. Please try again.');
      }
    } catch (e) {
      setSaveStatus('save-error', '<i class="fas fa-exclamation-triangle"></i> &nbsp;Could not save results.');
    }
  }
  </script>
